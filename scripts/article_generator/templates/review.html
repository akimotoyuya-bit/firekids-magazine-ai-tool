<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI推敲 - FIRE KIDS Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --fk-dark:   #1a1a1a;
  --fk-brown:  #5a5248;
  --fk-warm:   #8b6f47;
  --fk-accent: #c0282d;
  --fk-accent-d: #9a1f23;
  --fk-border: #e8e4de;
  --text:      #1a1a1a;
  --sub:       #5a5248;
  --muted:     #998f80;
  --success:   #2d7a3e;
  --radius:    16px;
  --sidebar-w: 210px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  color: var(--text);
  background:
    radial-gradient(1100px 560px at 8% -12%, rgba(192,40,45,0.09), transparent 60%),
    radial-gradient(960px 520px at 96% -4%, rgba(139,111,71,0.13), transparent 55%),
    linear-gradient(180deg, #fdfbf6 0%, #f6f0e5 55%, #f1e9da 100%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── Top header ─────────────────────────────────── */
.top-bar {
  background: rgba(26,26,26,0.85);
  backdrop-filter: blur(12px) saturate(140%);
  -webkit-backdrop-filter: blur(12px) saturate(140%);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  height: 56px; display: flex; align-items: center;
  padding: 0 22px; position: sticky; top: 0; z-index: 100;
  flex-shrink: 0; gap: 12px;
}
.brand-link { display: flex; align-items: baseline; gap: 8px; text-decoration: none; }
.brand-name { font-size: 17px; font-weight: 800; color: #fff; }
.brand-sub  { font-size: 11px; color: #9ca3af; }
.top-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.meta-chip {
  font-size: 11px; font-weight: 600;
  background: rgba(192,40,45,0.16); color: #e8888c;
  border: 1px solid rgba(192,40,45,0.4);
  border-radius: 999px; padding: 4px 12px;
}
.char-info { font-size: 11px; color: #9ca3af; }

/* ── Shell ──────────────────────────────────────── */
.shell { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* ── Sidebar ────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0; padding: 18px 0;
  display: flex; flex-direction: column; gap: 2px;
  border-right: 1px solid var(--fk-border);
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; font-size: 13px; color: var(--sub);
  text-decoration: none; border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s;
}
.sidebar-item:hover  { background: rgba(192,40,45,0.06); color: var(--text); }
.sidebar-item.active {
  background: rgba(192,40,45,0.1); color: var(--fk-accent-d);
  font-weight: 700; border-left-color: var(--fk-accent);
}
.sidebar-icon { width: 16px; text-align: center; font-size: 14px; flex-shrink: 0; }
.sidebar-bottom {
  margin-top: auto; padding: 14px 18px; font-size: 10px;
  color: var(--muted); border-top: 1px solid var(--fk-border);
}

/* ── Main ───────────────────────────────────────── */
.main-area { flex: 1; display: flex; gap: 18px; padding: 22px; min-width: 0; overflow: hidden; }
.split { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; min-width: 0; }
@media (max-width: 900px) { .split { grid-template-columns: 1fr; } }

.pane {
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 8px 30px rgba(90,82,72,0.1);
  border-radius: var(--radius);
  display: flex; flex-direction: column; overflow: hidden; min-height: 0;
}
.pane-header {
  padding: 11px 16px; border-bottom: 1px solid var(--fk-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; background: rgba(255,255,255,0.5);
}
.pane-title { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.07em; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 14px; padding: 2px 6px;
  border-radius: 4px; transition: color 0.15s, background 0.15s;
}
.icon-btn:hover { color: var(--fk-accent-d); background: rgba(192,40,45,0.08); }

#editor {
  flex: 1; padding: 18px; background: transparent; border: none; outline: none;
  color: #3a3328; font-family: ui-monospace, "SF Mono", monospace;
  font-size: 13px; line-height: 1.8; resize: none; overflow-y: auto;
}

/* ── プレビュー（WordPress記事ページ風）─────────────── */
#preview { flex: 1; overflow-y: auto; background: #fff; }
.wp-topbar {
  background: #1a1a1a; color: #fff; text-align: center;
  font-family: "Noto Sans JP", sans-serif; font-weight: 700;
  font-size: 12.5px; padding: 9px; letter-spacing: 0.03em;
}
.wp-header {
  background: #8e1728; padding: 14px 20px;
  display: flex; align-items: center; justify-content: center;
}
.wp-logo { color: #fff; font-family: "Cormorant Garamond", serif; font-size: 24px; font-weight: 600; letter-spacing: 0.05em; }
.wp-logo em { font-style: italic; opacity: 0.92; }
.wp-art { font-family: "Zen Kaku Gothic New","Noto Sans JP",sans-serif; color: #1a1a1a; padding: 22px 26px 50px; }
.wp-crumbs { font-size: 11px; color: #777; margin-bottom: 16px; }
.wp-crumbs .sep { margin: 0 6px; color: #bbb; }
.wp-crumbs .cur { color: #8e1728; }
.wp-art-title { font-size: 20px; font-weight: 700; line-height: 1.5; margin-bottom: 12px; }
.wp-art-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 11.5px; color: #999; margin-bottom: 20px; }
.wp-art-meta .cat { color: #8e1728; }
.wp-art-hero {
  position: relative; width: 100%; padding-top: 55.8%;
  background: linear-gradient(135deg,#2a2a2a,#4a3f38);
  border-radius: 4px; margin-bottom: 26px; overflow: hidden;
}
.wp-art-hero::after {
  content: "FIRE KIDS"; position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.3); font-family: "Cormorant Garamond", serif;
  font-size: 22px; letter-spacing: 0.1em;
}
.rte { font-size: 15px; line-height: 2.0; color: #2a2a2a; }
.rte h1 { display: none; }
.rte h2 { font-size: 19px; font-weight: 700; color: #1a1a1a; margin: 36px 0 16px; padding-bottom: 11px; border-bottom: 2px solid #8e1728; }
.rte h3 { font-size: 16px; font-weight: 700; color: #1a1a1a; margin: 26px 0 11px; padding-left: 11px; border-left: 4px solid #8e1728; }
.rte p { margin: 0 0 16px; }
.rte strong { font-weight: 700; color: #1a1a1a; }
.rte ul, .rte ol { padding-left: 22px; margin: 0 0 16px; }
.rte li { margin-bottom: 7px; }
.rte hr { border: none; border-top: 1px solid #e5e5e5; margin: 24px 0; }
.rte a {
  display: inline-block; background: #8e1728; color: #fff !important;
  text-decoration: none; font-weight: 700; font-size: 13.5px;
  padding: 12px 28px; border-radius: 9999px; margin: 6px 0;
}
.rte table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 13.5px; }
.rte th, .rte td { border: 1px solid #ddd; padding: 10px 13px; text-align: left; }
.rte thead th, .rte tr:first-child td { background: #f3f4f5; font-weight: 700; }
.rte img { max-width: 100%; height: auto; border-radius: 4px; margin: 8px 0; }
.rte blockquote { border-left: 4px solid #8e1728; margin: 16px 0; padding: 8px 16px; background: #faf3f4; color: #6a2a32; }
.rte code { background: #f3f4f5; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }

/* ── Stepper ────────────────────────────────────── */
.stepper-col { width: 150px; flex-shrink: 0; }
.stepper {
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 8px 30px rgba(90,82,72,0.1);
  border-radius: var(--radius); padding: 16px 0;
}
.step-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 18px; position: relative; }
.step-item:not(:last-child)::after {
  content: ''; position: absolute; left: 25px; top: 32px;
  width: 2px; height: calc(100% - 12px); background: #ece2d4;
}
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: #ece2d4; color: var(--muted);
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; position: relative; z-index: 1;
}
.step-item.active .step-num { background: var(--fk-accent); color: #fff; }
.step-item.done   .step-num { background: var(--success); color: #fff; }
.step-label { font-size: 12px; color: var(--muted); line-height: 1.4; padding-top: 2px; }
.step-item.active .step-label { color: var(--fk-accent-d); font-weight: 700; }
.step-item.done   .step-label { color: var(--success); }

/* ── Action row ─────────────────────────────────── */
.action-row { margin-top: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn-primary {
  padding: 10px 22px;
  background: linear-gradient(120deg,#c0282d,#9a1f23);
  border: none; border-radius: 10px;
  color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(192,40,45,0.32);
  transition: opacity 0.15s;
}
.btn-primary:hover    { opacity: 0.92; }
.btn-primary:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; }
.btn-secondary {
  padding: 9px 18px; background: #fff;
  border: 1px solid var(--fk-border); border-radius: 10px;
  color: var(--sub); font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s; text-decoration: none;
  display: inline-flex; align-items: center;
}
.btn-secondary:hover { background: #faf4ea; }
.save-msg { font-size: 12px; padding: 6px 12px; border-radius: 8px; }
.save-msg.ok { background: #eef7ef; border: 1px solid #bfe3c6; color: #1e5e2c; }
.save-msg.ng { background: #f9eded; border: 1px solid #e8c0c0; color: #8a2f2f; }
</style>
</head>
<body>

<header class="top-bar">
  <a class="brand-link" href="/">
    <span class="brand-name">FIRE KIDS Magazine</span>
    <span class="brand-sub">記事生成</span>
  </a>
  <div class="top-right">
    <span class="meta-chip" id="brand-chip">{{ brand }}</span>
    <span class="char-info" id="char-info"></span>
  </div>
</header>

<div class="shell">
  <nav class="sidebar">
    <a class="sidebar-item" href=".">
      <span class="sidebar-icon">✎</span>記事を作成
    </a>
    <a class="sidebar-item active" href="review">
      <span class="sidebar-icon">☰</span>AI推敲
    </a>
    <a class="sidebar-item" href="#">
      <span class="sidebar-icon">⊘</span>過去投稿済み記事一覧
    </a>
    <a class="sidebar-item" href="#">
      <span class="sidebar-icon">◷</span>投稿スケジュール
    </a>
    <a class="sidebar-item" href="#">
      <span class="sidebar-icon">⊞</span>プロンプト
    </a>
    <a class="sidebar-item" href="#">
      <span class="sidebar-icon">⌘</span>キーワード
    </a>
    <a class="sidebar-item" href="../upload/">
      <span class="sidebar-icon">⇪</span>WP投稿
    </a>
    <div class="sidebar-bottom">FIRE KIDS Magazine — 内部使用限定</div>
  </nav>

  <div class="main-area">
    <div style="flex:1; display:flex; flex-direction:column; min-width:0; gap:10px;">
      <div class="split">
        <div class="pane">
          <div class="pane-header">
            <span class="pane-title">Markdown 編集</span>
            <button class="icon-btn" onclick="copyAll(this)" title="コピー">⎘</button>
          </div>
          <textarea id="editor" spellcheck="false">{{ article }}</textarea>
        </div>
        <div class="pane">
          <div class="pane-header">
            <span class="pane-title">プレビュー</span>
            <button class="icon-btn" onclick="refreshPreview()" title="更新">↻</button>
          </div>
          <div id="preview"></div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn-primary" id="save-btn" onclick="saveArticle()">TXT保存（articles/BRAND/）</button>
        <a class="btn-secondary" href=".">← 再生成</a>
        <button class="btn-secondary" onclick="copyAll(this)">クリップボードにコピー</button>
        <span id="save-msg"></span>
      </div>
    </div>

    <div class="stepper-col">
      <div class="stepper">
        <div class="step-item done"><div class="step-num">1</div><div class="step-label">一次執筆</div></div>
        <div class="step-item active"><div class="step-num">2</div><div class="step-label">AI推敲</div></div>
        <div class="step-item"><div class="step-num">3</div><div class="step-label">画像生成</div></div>
        <div class="step-item"><div class="step-num">4</div><div class="step-label">プレビュー</div></div>
        <div class="step-item"><div class="step-num">5</div><div class="step-label">投稿</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const brand    = {{ brand | tojson }};
const initSlug = {{ slug  | tojson }};
const editor   = document.getElementById('editor');
const preview  = document.getElementById('preview');

marked.setOptions({ breaks: true, gfm: true });

// 記事Markdownを「タイトル」と「本文」に分離（先頭H1とフロントマター --- ... --- を除去）
function splitArticle(md) {
  let title = '';
  const m = md.match(/^\s*#\s+(.+?)\s*$/m);
  if (m) title = m[1].trim();
  let body = md.replace(/^\s*#\s+.+?\s*$\n?/m, '');
  body = body.replace(/^\s*-{3,}[\s\S]*?-{3,}\s*/, '');
  return { title, body };
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function refreshPreview() {
  const { title, body } = splitArticle(editor.value || '');
  const d = new Date();
  const dateStr = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  const t = title || (brand ? brand + ' 記事' : '記事タイトル');
  preview.innerHTML =
    '<div class="wp-topbar">ヴィンテージ時計の魅力を伝える専門メディア</div>' +
    '<div class="wp-header"><span class="wp-logo">FIRE KIDS <em>MAGAZINE</em></span></div>' +
    '<div class="wp-art">' +
      '<div class="wp-crumbs"><span>トップ</span><span class="sep">›</span>' +
      '<span>すべての記事</span><span class="sep">›</span><span class="cur">' + escHtml(t) + '</span></div>' +
      '<h1 class="wp-art-title">' + escHtml(t) + '</h1>' +
      '<div class="wp-art-meta"><span>' + dateStr + '</span>' +
      '<span class="cat">時計の基礎知識</span><span>Written by 秋吉 健太</span></div>' +
      '<div class="wp-art-hero"></div>' +
      '<div class="rte">' + marked.parse(body || '') + '</div>' +
    '</div>';
}

let timer = null;
editor.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(refreshPreview, 300);
  updateInfo();
});
function updateInfo() { document.getElementById('char-info').textContent = editor.value.length.toLocaleString() + '字'; }

async function saveArticle() {
  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('save-msg');
  btn.disabled = true; msg.className = ''; msg.textContent = '保存中…';
  try {
    const res = await fetch('save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brand, slug: initSlug, content: editor.value }),
    });
    const data = await res.json();
    if (data.ok) { msg.className = 'save-msg ok'; msg.textContent = '✓ 保存完了: ' + data.saved_path; }
    else { msg.className = 'save-msg ng'; msg.textContent = '✗ ' + data.error; }
  } catch(e) { msg.className = 'save-msg ng'; msg.textContent = 'エラー: ' + e.message; }
  finally { btn.disabled = false; }
}

function copyAll(btn) {
  navigator.clipboard.writeText(editor.value).then(() => {
    if (btn) { const o = btn.textContent; btn.textContent = '✓'; setTimeout(() => btn.textContent = o, 1500); }
  });
}

refreshPreview();
updateInfo();
</script>
</body>
</html>
